<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PNG to SVG & URL Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: #ffffff;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }
        .preview-grid {
            background-image: 
                linear-gradient(45deg, #111 25%, transparent 25%), 
                linear-gradient(-45deg, #111 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #111 75%), 
                linear-gradient(-45deg, transparent 75%, #111 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            background-color: #000;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
        }
        .loader {
            border: 3px solid #111;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <div class="w-full max-w-5xl space-y-8">
        <!-- Header -->
        <div class="text-center space-y-2">
            <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight">SVG <span class="text-blue-500">PRO</span> CONVERTER</h1>
            <p class="text-gray-400 text-lg">Convert transparent PNGs to production-ready SVG code and URLs</p>
        </div>

        <!-- Main Workspace -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <!-- Left Side: Upload & Input -->
            <div class="glass-card p-8 flex flex-col space-y-6">
                <div id="dropZone" class="border-2 border-dashed border-gray-700 rounded-3xl p-12 text-center hover:border-blue-500 transition-colors cursor-pointer group">
                    <input type="file" id="fileInput" class="hidden" accept="image/png">
                    <div id="uploadPrompt">
                        <div class="bg-blue-500/10 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 group-hover:scale-110 transition-transform">
                            <svg class="w-8 h-8 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                        </div>
                        <h3 class="text-xl font-semibold">Upload PNG</h3>
                        <p class="text-gray-500 text-sm mt-2">Drag and drop your transparent image here</p>
                    </div>
                    <div id="processingUI" class="hidden flex flex-col items-center">
                        <div class="loader mb-4"></div>
                        <p class="text-blue-500 font-medium animate-pulse">Generating SVG Code...</p>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div id="actionButtons" class="hidden grid grid-cols-2 gap-4">
                    <button onclick="copyCode()" class="btn-primary p-4 rounded-2xl font-bold flex items-center justify-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                        Copy SVG
                    </button>
                    <button onclick="copyURL()" class="bg-white/10 hover:bg-white/20 p-4 rounded-2xl font-bold transition-all flex items-center justify-center gap-2 text-white">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                        Copy URL
                    </button>
                </div>

                <!-- URL Output -->
                <div id="urlContainer" class="hidden animate-in fade-in slide-in-from-bottom-2">
                    <label class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-2 block">Generated Data URL</label>
                    <div id="urlText" class="bg-black p-4 rounded-xl text-[10px] text-blue-400 font-mono break-all border border-blue-500/20 max-h-24 overflow-y-auto custom-scrollbar"></div>
                </div>
            </div>

            <!-- Right Side: Preview & Code -->
            <div class="space-y-6">
                <!-- Preview -->
                <div class="glass-card p-6 h-[300px] flex flex-col">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-xs font-bold text-gray-500 uppercase">Live SVG Preview</span>
                        <div class="flex gap-1">
                            <div class="w-2 h-2 rounded-full bg-red-500"></div>
                            <div class="w-2 h-2 rounded-full bg-yellow-500"></div>
                            <div class="w-2 h-2 rounded-full bg-green-500"></div>
                        </div>
                    </div>
                    <div id="previewArea" class="flex-1 preview-grid rounded-xl border border-gray-800 flex items-center justify-center overflow-hidden p-4">
                        <p class="text-gray-600 text-sm">Preview will appear here</p>
                    </div>
                </div>

                <!-- Code Area -->
                <div class="glass-card p-6 h-[230px] flex flex-col">
                    <span class="text-xs font-bold text-gray-500 uppercase mb-4 block">SVG Source Code</span>
                    <textarea id="codeOutput" readonly class="flex-1 bg-black/40 rounded-xl p-4 text-[11px] text-green-500 font-mono focus:outline-none border border-gray-800 custom-scrollbar resize-none" placeholder="<!-- SVG Code -->"></textarea>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification -->
    <div id="notification" class="fixed bottom-8 bg-blue-600 text-white px-8 py-4 rounded-2xl shadow-2xl transition-all duration-300 translate-y-24 opacity-0 font-bold">
        Copied to clipboard!
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const uploadPrompt = document.getElementById('uploadPrompt');
        const processingUI = document.getElementById('processingUI');
        const previewArea = document.getElementById('previewArea');
        const codeOutput = document.getElementById('codeOutput');
        const actionButtons = document.getElementById('actionButtons');
        const urlContainer = document.getElementById('urlContainer');
        const urlText = document.getElementById('urlText');
        const notification = document.getElementById('notification');

        let currentSVG = "";
        let currentDataURL = "";

        // UI Interactions
        dropZone.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            if (e.target.files.length > 0) handleFile(e.target.files[0]);
        };

        dropZone.ondragover = (e) => {
            e.preventDefault();
            dropZone.classList.add('border-blue-500', 'bg-blue-500/5');
        };

        dropZone.ondragleave = () => {
            dropZone.classList.remove('border-blue-500', 'bg-blue-500/5');
        };

        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('border-blue-500', 'bg-blue-500/5');
            if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
        };

        function handleFile(file) {
            if (!file.type.includes('image')) return;

            uploadPrompt.classList.add('hidden');
            processingUI.classList.remove('hidden');

            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    generateSVG(event.target.result, img.width, img.height);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        function generateSVG(base64, width, height) {
            // High precision SVG Wrapper for transparent PNGs
            const svgCode = `<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">\n  <image href="${base64}" width="${width}" height="${height}" />\n</svg>`;
            
            currentSVG = svgCode;
            currentDataURL = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(svgCode)));

            // Update UI
            previewArea.innerHTML = svgCode;
            const previewSvg = previewArea.querySelector('svg');
            previewSvg.style.maxWidth = "100%";
            previewSvg.style.maxHeight = "100%";
            previewSvg.style.height = "auto";

            codeOutput.value = svgCode;
            urlText.innerText = currentDataURL;

            processingUI.classList.add('hidden');
            uploadPrompt.classList.remove('hidden');
            actionButtons.classList.remove('hidden');
            urlContainer.classList.remove('hidden');
        }

        function copyCode() {
            if (!currentSVG) return;
            navigator.clipboard.writeText(currentSVG);
            showNotify("SVG Code Copied!");
        }

        function copyURL() {
            if (!currentDataURL) return;
            navigator.clipboard.writeText(currentDataURL);
            showNotify("Data URL Copied!");
        }

        function showNotify(msg) {
            notification.innerText = msg;
            notification.classList.remove('translate-y-24', 'opacity-0');
            setTimeout(() => {
                notification.classList.add('translate-y-24', 'opacity-0');
            }, 3000);
        }
    </script>
</body>
</html>
